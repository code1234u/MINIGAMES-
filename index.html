<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGames</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars */
            font-family: sans-serif;
            background-color: white; /* Default background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        #topImage {
            width: 100%;
            max-width: 800px; /* Adjust as needed */
            margin-top: 20px;
            display: block;
            object-fit: contain;
        }

        #startButtonContainer {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #startButton {
            background-color: gray;
            color: white;
            padding: 20px 40px;
            font-size: 24px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        #startButton:hover {
            background-color: darkgray;
        }

        #gameContainer {
            display: none; /* Hidden until game starts */
            width: 100%;
            height: 100vh;
            position: relative;
            background-color: white; /* Game background */
            overflow: hidden;
        }

        #groundLine {
            position: absolute;
            bottom: 50px; /* Adjust as needed for cube to stand on */
            left: 0;
            width: 100%;
            height: 5px;
            background-color: black;
        }

        #cube {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: black;
            bottom: 55px; /* On top of the ground line */
            left: 100px;
            transition: bottom 0.2s ease-out; /* For smooth jumping */
        }

        #cactus {
            position: absolute;
            width: 30px;
            height: 100px; /* Tall green block */
            background-color: green;
            bottom: 55px; /* On top of the ground line */
            right: -50px; /* Start off-screen to the right */
        }
    </style>
</head>
<body>

    <img id="topImage" src="WebGames.png" alt="WebGames Logo">

    <div id="startButtonContainer">
        <button id="startButton">START</button>
    </div>

    <div id="gameContainer">
        <div id="groundLine"></div>
        <div id="cube"></div>
        <div id="cactus"></div>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const topImage = document.getElementById('topImage');
        const startButtonContainer = document.getElementById('startButtonContainer');
        const gameContainer = document.getElementById('gameContainer');
        const cube = document.getElementById('cube');
        const cactus = document.getElementById('cactus');
        const groundLine = document.getElementById('groundLine');

        let isJumping = false;
        let gameStarted = false;
        let cactusSpeed = 7; // Adjust for faster/slower cactus
        let cactusInterval;
        let cubeBottom = 55; // Initial position for the cube
        const jumpHeight = 170; // How high the cube jumps

        // Function to reset the game to its initial state
        function resetGame() {
            gameStarted = false;
            if (cactusInterval) clearInterval(cactusInterval); // Stop cactus movement
            
            topImage.style.display = 'block';
            startButtonContainer.style.display = 'flex';
            gameContainer.style.display = 'none';
            
            // Reset cube and cactus positions
            cube.style.bottom = `${cubeBottom}px`;
            cactus.style.right = '-50px';
        }

        startButton.addEventListener('click', () => {
            startGame();
        });

        function startGame() {
            gameStarted = true;
            topImage.style.display = 'none';
            startButtonContainer.style.display = 'none';
            gameContainer.style.display = 'block';

            // Start cactus movement after 3 seconds
            setTimeout(() => {
                moveCactus();
            }, 3000);
        }

        function jump() {
            if (!isJumping && gameStarted) {
                isJumping = true;
                let jumpCount = 0;
                const jumpUpInterval = setInterval(() => {
                    if (jumpCount < jumpHeight) {
                        cubeBottom += 5;
                        cube.style.bottom = `${cubeBottom}px`;
                        jumpCount += 3;
                    } else {
                        clearInterval(jumpUpInterval);
                        const fallInterval = setInterval(() => {
                            if (cubeBottom > 55) { // Fall back to original position
                                cubeBottom -= 5;
                                cube.style.bottom = `${cubeBottom}px`;
                            } else {
                                clearInterval(fallInterval);
                                isJumping = false;
                                cube.style.bottom = '55px'; // Ensure it lands exactly on the ground
                            }
                        }, 3000); // Fall speed
                    }
                }, 50); // Jump speed
            }
        }

        document.addEventListener('keydown', (event) => {
            // Spacebar for PC
            if (event.code === 'Space') {
                jump();
            }
        });

        document.addEventListener('touchstart', () => {
             // Tap on mobile
            jump();
        });


        function moveCactus() {
            let cactusRight = -50;
            cactus.style.right = `${cactusRight}px`; // Reset position at the start
            cactusInterval = setInterval(() => {
                cactusRight += cactusSpeed;
                cactus.style.right = `${cactusRight}px`;

                // Check for collision
                const cubeRect = cube.getBoundingClientRect();
                const cactusRect = cactus.getBoundingClientRect();

                if (
                    cactusRect.left < cubeRect.right &&
                    cactusRect.right > cubeRect.left &&
                    cactusRect.top < cubeRect.bottom &&
                    cactusRect.bottom > cubeRect.top
                ) {
                    // Collision detected! Go back to home page (reset game)
                    resetGame();
                }

                // If cactus goes off screen to the left, reset its position
                if (cactusRight > window.innerWidth + 50) {
                    cactusRight = -50; // Reset off-screen to the right
                }
            }, 40); // Cactus movement speed
        }

        resetGame(); // Ensure game is in initial state on load
    </script>
</body>
</html>
