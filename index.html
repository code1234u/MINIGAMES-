<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cube Jump</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: white;
}

/* HOME SCREEN */
#home {
    height: 100vh;
    background: white;
    text-align: center;
}

/* TITLE */
#title {
    font-size: 60px;
    font-weight: bold;
    margin-top: 20px;
}

/* PNG */
#logo {
    max-width: 200px;
    margin-top: 10px;
}

/* START BOX */
#start {
    width: 200px;
    height: 120px;
    margin: 40px auto;
    background: #ccc;
    border: 3px solid black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
}

/* GAME SCREEN */
#game {
    display: none;
    width: 100%;
    height: 100vh;
    background: white;
    position: relative;
    overflow: hidden;
}

/* ground line */
#ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 4px;
    background: black;
}

/* cube */
#cube {
    position: absolute;
    left: 60px;
    bottom: 4px;
    width: 40px;
    height: 40px;
    background: black;
}

/* cactus */
#cactus {
    position: absolute;
    bottom: 4px;
    width: 25px;
    height: 45px;
    background: green;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
    <div id="title">CUBE JUMP</div>
    <img id="logo" src="WebGames.png">
    <div id="start" onclick="startGame()">START</div>
</div>

<!-- GAME -->
<div id="game">
    <div id="ground"></div>
    <div id="cube"></div>
    <div id="cactus"></div>
</div>

<script>
let home = document.getElementById("home");
let game = document.getElementById("game");
let cube = document.getElementById("cube");
let cactus = document.getElementById("cactus");

let y = 0;
let vel = 0;
let gravity = 0.8;
let jumping = false;

let running = false;
let x = 200;
let started = false;

/* START GAME */
function startGame() {
    home.style.display = "none";
    game.style.display = "block";

    running = true;
    started = false;

    x = 200; // start cactus OFF SCREEN (fix instant death)

    setTimeout(() => {
        started = true; // cactus only starts AFTER 10 sec
    }, 10000);

    loop();
}

/* JUMP */
function jump() {
    if (!jumping && running) {
        vel = 12;
        jumping = true;
    }
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

/* LOOP */
function loop() {
    if (!running) return;

    // physics
    y += vel;
    vel -= gravity;

    if (y < 0) {
        y = 0;
        jumping = false;
    }

    cube.style.bottom = (4 + y) + "px";

    // cactus ONLY moves after 10 seconds
    if (started) {
        x -= 7;
        cactus.style.left = x + "px";

        // reset cactus when off screen
        if (x < -50) {
            x = 200;
        }

        // collision
        if (x < 90 && x > 40 && y < 30) {
            gameOver();
        }
    } else {
        cactus.style.left = "200px"; // keep it off screen before start
    }

    requestAnimationFrame(loop);
}

/* GAME OVER */
function gameOver() {
    running = false;

    alert("GAME OVER");

    // reset back to home
    home.style.display = "block";
    game.style.display = "none";

    y = 0;
    vel = 0;
}
</script>

</body>
</html>
