<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cube Jump</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: white;
    overflow: hidden;
}

/* BIG TITLE */
#title {
    font-size: 50px;
    font-weight: bold;
    margin: 20px;
}

/* HOME BUTTON */
#startBtn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #bbb;
    padding: 15px;
    border: 2px solid #333;
    cursor: pointer;
    font-weight: bold;
}

/* GAME SCREEN */
#game {
    display: none;
    width: 100%;
    height: 100vh;
    background: white;
    position: relative;
}

/* ground */
#ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 4px;
    background: black;
}

/* cube */
#cube {
    position: absolute;
    left: 60px;
    bottom: 4px;
    width: 40px;
    height: 40px;
    background: black;
}

/* cactus (advanced look) */
.cactus {
    position: absolute;
    bottom: 4px;
    width: 25px;
    height: 45px;
    background: green;
    border-left: 4px solid white;
    border-right: 4px solid black;
}

/* GAME OVER SCREEN */
#overlay {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: grey;
    color: white;
    font-size: 40px;
    text-align: center;
    padding-top: 40vh;
}
</style>
</head>

<body>

<div id="title">CUBE JUMP</div>

<div id="startBtn" onclick="startGame()">Start</div>

<div id="game">
    <div id="ground"></div>
    <div id="cube"></div>
    <div id="overlay">GAME OVER</div>
</div>

<script>
let game = document.getElementById("game");
let cube = document.getElementById("cube");
let overlay = document.getElementById("overlay");

let y = 0;
let vel = 0;
let gravity = 0.8;
let jumping = false;

let running = false;
let obstacle = null;

/* START GAME */
function startGame() {
    document.getElementById("title").style.display = "none";
    document.getElementById("startBtn").style.display = "none";

    game.style.display = "block";
    overlay.style.display = "none";

    running = true;
    spawn();
    loop();
}

/* JUMP */
function jump() {
    if (!jumping && running) {
        vel = 12;
        jumping = true;
    }
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

/* SPAWN ONE OBSTACLE AT A TIME */
function spawn() {
    if (!running) return;

    if (obstacle) obstacle.remove();

    obstacle = document.createElement("div");
    obstacle.classList.add("cactus");
    obstacle.style.left = "100%";
    game.appendChild(obstacle);

    setTimeout(spawn, 1800);
}

/* GAME LOOP */
function loop() {
    if (!running) return;

    // physics
    y += vel;
    vel -= gravity;

    if (y < 0) {
        y = 0;
        jumping = false;
    }

    cube.style.bottom = (4 + y) + "px";

    // move cactus
    if (obstacle) {
        let left = parseFloat(obstacle.style.left);
        left -= 7;
        obstacle.style.left = left + "px";

        // collision
        if (left < 85 && left > 40 && y < 30) {
            gameOver();
        }

        if (left < -50) {
            obstacle.remove();
            obstacle = null;
        }
    }

    requestAnimationFrame(loop);
}

/* GAME OVER */
function gameOver() {
    running = false;
    overlay.style.display = "block";

    setTimeout(() => {
        location.reload(); // back to home screen reset
    }, 1500);
}
</script>

</body>
</html>
