<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cube Jump</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: white;
    overflow: hidden;
}

/* MENU */
#menu {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

#startBox {
    width: 220px;
    height: 130px;
    background: #ccc;
    border: 3px solid black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
}

/* GAME */
#game {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
    background: white;
}

#ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 4px;
    background: black;
}

#cube {
    position: absolute;
    left: 60px;
    bottom: 4px;
    width: 40px;
    height: 40px;
    background: black;
}

#cactus {
    position: absolute;
    bottom: 4px;
    width: 25px;
    height: 45px;
    background: green;
}
</style>
</head>

<body>

<div id="menu">
    <div id="startBox" onclick="startGame()">CUBE JUMP</div>
</div>

<div id="game">
    <div id="ground"></div>
    <div id="cube"></div>
    <div id="cactus"></div>
</div>

<script>
let menu = document.getElementById("menu");
let game = document.getElementById("game");
let cube = document.getElementById("cube");
let cactus = document.getElementById("cactus");

let y = 0;
let vel = 0;
let gravity = 0.8;
let jumping = false;

let running = false;
let x = 120;

/* START */
function startGame() {
    menu.style.display = "none";
    game.style.display = "block";

    running = true;
    x = 120;

    setTimeout(spawnLoop, 10000); // ⭐ FIRST cactus after 10 seconds
    loop();
}

/* jump */
function jump() {
    if (!jumping && running) {
        vel = 12;
        jumping = true;
    }
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

/* cactus loop */
function spawnLoop() {
    if (!running) return;

    x = 120;
    setTimeout(spawnLoop, 2000); // next cactus every 2 sec after first
}

/* game loop */
function loop() {
    if (!running) return;

    // physics
    y += vel;
    vel -= gravity;

    if (y < 0) {
        y = 0;
        jumping = false;
    }

    cube.style.bottom = (4 + y) + "px";

    // move cactus
    x -= 7;
    cactus.style.left = x + "px";

    // collision
    if (x < 90 && x > 40 && y < 30) {
        alert("GAME OVER");
        location.reload();
    }

    requestAnimationFrame(loop);
}
</script>

</body>
</html>
